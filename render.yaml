services:
  # ── Backend API ───────────────────────────────────────────
  - type: web
    name: vea-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/startup.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: vea-database
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DASHBOARD_URL
        sync: false

  # ── Frontend ──────────────────────────────────────────────
  - type: web
    name: vea-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NEXT_PUBLIC_API_URL
        sync: false

databases:
  # ── PostgreSQL ────────────────────────────────────────────
  - name: vea-database
    plan: free
    databaseName: vision_europe_africa
    user: vea_user
